<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乐道L80 静态品鉴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .page {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://daiki-1304990605.cos.ap-shanghai.myqcloud.com/LD80/images/P1-1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .cover-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .btn-enter {
            position: absolute;
            border: none;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 55px;
            background: transparent;
            cursor: pointer;
            z-index: 10;
        }

</head>
<body>
    <div class="page">
        <img src="https://daiki-1304990605.cos.ap-shanghai.myqcloud.com/LD80/images/P1-2.png" alt="" class="cover-image">
