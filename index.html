<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乐道L80 静态品鉴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .page {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('images/P1-1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            margin-top: 20px;
            width: 240px;
            height: auto;
        }

        .logo img {
            width: 100%;
            height: auto;
        }

        .main-title {
            margin-top: 24px;
            font-size: 48px;
            font-weight: 300;
            color: white;
            letter-spacing: 8px;
        }

        .sub-title {
            margin-top: 20px;
            font-size: 32px;
            font-weight: 400;
            color: white;
            letter-spacing: 2px;
        }

        .event-type {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
        }

        .event-info {
            margin-top: 60px;
            text-align: center;
        }

        .date {
            font-size: 20px;
            color: #FF6B4A;
            letter-spacing: 2px;
        }

        .location {
            margin-top: 8px;
            font-size: 18px;
            color: #E63946;
            letter-spacing: 1px;
        }

        .arrow-down {
            margin-top: 40px;
            width: 30px;
            height: 30px;
        }

        .btn-enter {
            position: absolute;
            bottom: 120px;
            width: 200px;
            height: 50px;
            background: linear-gradient(180deg, #FFF5E6 0%, #FFE4C4 100%);
            border: none;
            border-radius: 25px;
            font-size: 16px;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-enter:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="logo">
            <img src="images/P1-logo.png" alt="乐道L80">
        </div>

        <h1 class="main-title">乐道L80</h1>
        <h2 class="sub-title">「双舱超级大五座」</h2>
        <p class="event-type">静态品鉴</p>

        <div class="event-info">
            <p class="date">2026.4.8-4.21</p>
            <p class="location">中国·厦门</p>
        </div>

        <div class="arrow-down">
            <svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 10 L15 20 L23 10" stroke="#FF6B4A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 18 L15 28 L23 18" stroke="#FF6B4A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
            </svg>
        </div>

        <button class="btn-enter" onclick="location.href='page2.html'">点击进入</button>
    </div>
</body>
</html>
