<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>山野为邻 双舱为家</title>
    <style>
        @font-face {
            font-family: 'ONVOFJH';
            src: url('../font/ONVOFJHRegular.otf') format('opentype');
            font-weight: normal;
        }
        @font-face {
            font-family: 'ONVOFJH';
            src: url('../font/ONVOFJHBold.otf') format('opentype');
            font-weight: bold;
        }
        @font-face {
            font-family: 'ONVOFJH';
            src: url('../font/ONVOFJHLight.otf') format('opentype');
            font-weight: 300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ONVOFJH', -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .car-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transform: translateY(var(--mask-offset, 0px));
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .car-scene img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            color: #7F7E7E;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            z-index: 15;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .back-btn svg path {
            stroke: #7F7E7E;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .initial-mask {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25%;
            z-index: 10;
            background: transparent;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: height;
            overflow: hidden;
        }

        .initial-mask.expanded {
            height: 45%;
            background: #FDE1B0FF;
        }

        .initial-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .initial-mask.expanded .initial-content {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .initial-text {
            font-size: 24px;
            color: #FFF;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .initial-arrows {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .arrow-up {
            width: 24px;
            height: 24px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        .arrow-up svg {
            width: 100%;
            height: 100%;
            fill: #FFF;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .detail-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            overflow-y: auto;
            text-align: center;
        }

        .detail-content > * {
            flex-shrink: 0;
        }

        .initial-mask.expanded .detail-content {
            opacity: 1;
            pointer-events: auto;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .detail-back-btn svg {
            width: 16px;
            height: 16px;
        }

        .detail-back-btn svg path {
            stroke: #fff;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .feature-desc {
            font-size: 13px;
            font-weight: 600;
            color: #454955;
            line-height: 1.5;
        }

        .slogan {
            text-align: center;
            padding-bottom: 1.5%;
        }

        .slogan-text {
            font-size: 18px;
            font-weight: 600;
            color: #454955;
            letter-spacing: 2px;
            line-height: 1.5;
        }

        .detail-content::-webkit-scrollbar {
            display: none;
        }

        .detail-content {
            scrollbar-width: none;
        }

        @media (max-width: 375px) {
            .initial-text {
                font-size: 16px;
            }

            .feature-desc {
                font-size: 12px;
            }

            .feature-item {
                margin-bottom: 15px;
            }

            .slogan-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div class="car-scene">
    <img src="http://daiki-1304990605.cos.ap-shanghai.myqcloud.com/LD80/images/%E3%80%8A%E5%B1%B1%E9%87%8E%E4%B8%BA%E9%82%BB%20%E5%8F%8C%E8%88%B1%E4%B8%BA%E5%AE%B6%E3%80%8B.png" alt="汽车景观">
</div>

<div class="back-btn" onclick="location.href='../page2.html'">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 19L8 12L14 5"/>
    </svg>
    <span>返回</span>
</div>

<div class="initial-mask" id="initialMask">
    <div class="initial-content">
        <p class="initial-text">「 山野为邻 双舱为家 」</p>
        <div class="initial-arrows">
            <div class="arrow-up">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 14L12 9L17 14" stroke="#FFF" stroke-width="2" fill="none" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M7 18L12 13L17 18" stroke="#FFF" stroke-width="2" fill="none" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="detail-content">
        <div class="detail-header">
            <!--                <div class="detail-back-btn" id="collapseBtn">-->
            <!--                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">-->
            <!--                        <path d="M19 12L5 12M5 12L11 18M5 12L11 6"/>-->
            <!--                    </svg>-->
            <!--                </div>-->
            <!--                <h2 class="detail-title">点位介绍</h2>-->
        </div>

        <div class="feature-item">
            <div class="slogan">
                <p class="slogan-text">
                    阖家趣野<br>
                    给全家一座移动露营别墅
                </p>
            </div>
            <p class="feature-desc">
                暮色中<br/>
                旋转攀梯搭建车顶帐，拓展二楼观星台<br/>
                与家人静享神秘星空，舒躺双舱空间<br/>
                一键放倒二排平铺大床<br/>
                超广角补盲影像 定格璀璨夜景<br/>
                乐道L80“三室两厅”大空间包容每段亲子陪伴<br/>
                让户外畅玩更轻松，更安心
            </p>
        </div>

    </div>
</div>

<script>
    const initialMask = document.getElementById('initialMask');

    const SLIDE_THRESHOLD = 0.12;

    let startY = 0;
    let currentY = 0;
    let isDragging = false;
    let isExpanded = false;
    let accumulatedDelta = 0;

    function expandMask() {
        initialMask.classList.add('expanded');
        isExpanded = true;
        accumulatedDelta = 0;
        document.documentElement.style.setProperty('--mask-offset', '-22vh');
    }

    function collapseMask() {
        initialMask.classList.remove('expanded');
        isExpanded = false;
        accumulatedDelta = 0;
        document.documentElement.style.setProperty('--mask-offset', '0px');
    }

    const detailContent = document.querySelector('.detail-content');
    let detailStartY = 0;
    let detailDragging = false;

    detailContent.addEventListener('touchstart', function(e) {
        detailStartY = e.touches[0].clientY;
        detailDragging = true;
    }, { passive: true });

    detailContent.addEventListener('touchend', function(e) {
        if (!detailDragging || !isExpanded) return;
        const deltaY = e.changedTouches[0].clientY - detailStartY;
        if (deltaY > 40) {
            collapseMask();
        }
        detailDragging = false;
    });

    detailContent.addEventListener('mousedown', function(e) {
        detailStartY = e.clientY;
        detailDragging = true;
    });

    document.addEventListener('mouseup', function(e) {
        if (!detailDragging || !isExpanded) return;
        const deltaY = e.clientY - detailStartY;
        if (deltaY > 40) {
            collapseMask();
        }
        detailDragging = false;
    });

    function handleDragStart(clientY) {
        if (isExpanded) return;
        startY = clientY;
        isDragging = true;
        accumulatedDelta = 0;
        initialMask.style.transition = 'none';
    }

    function handleDragMove(clientY) {
        if (!isDragging || isExpanded) return;
        currentY = clientY;
        const deltaY = startY - currentY;
        accumulatedDelta = deltaY;
    }

    function handleDragEnd() {
        if (!isDragging || isExpanded) return;
        isDragging = false;
        initialMask.style.transition = 'height 0.4s cubic-bezier(0.4, 0, 0.2, 1)';

        if (accumulatedDelta > window.innerHeight * SLIDE_THRESHOLD) {
            expandMask();
        } else {
            accumulatedDelta = 0;
        }
    }

    initialMask.addEventListener('touchstart', function(e) {
        handleDragStart(e.touches[0].clientY);
    }, { passive: true });

    initialMask.addEventListener('touchmove', function(e) {
        handleDragMove(e.touches[0].clientY);
    }, { passive: true });

    initialMask.addEventListener('touchend', handleDragEnd);

    initialMask.addEventListener('mousedown', function(e) {
        handleDragStart(e.clientY);
    });

    document.addEventListener('mousemove', function(e) {
        handleDragMove(e.clientY);
    });

    document.addEventListener('mouseup', handleDragEnd);

    let collapseDragging = false;
    let collapseStartY = 0;

    document.addEventListener('touchstart', function(e) {
        if (!isExpanded) return;
        const touchY = e.touches[0].clientY;
        const maskTop = initialMask.offsetTop;
        if (touchY < maskTop) {
            collapseStartY = touchY;
            collapseDragging = true;
        }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
        if (!collapseDragging || !isExpanded) return;
        const deltaY = e.touches[0].clientY - collapseStartY;
        if (deltaY > 40) {
            collapseMask();
            collapseDragging = false;
        }
    }, { passive: true });

    document.addEventListener('touchend', function() {
        collapseDragging = false;
    });

    document.addEventListener('mousedown', function(e) {
        if (!isExpanded) return;
        const maskTop = initialMask.offsetTop;
        if (e.clientY < maskTop) {
            collapseStartY = e.clientY;
            collapseDragging = true;
        }
    });

    document.addEventListener('mouseup', function(e) {
        if (!collapseDragging || !isExpanded) return;
        const deltaY = e.clientY - collapseStartY;
        if (deltaY > 40) {
            collapseMask();
        }
        collapseDragging = false;
    });
</script>
</body>
</html>
