<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>营地导览 - 乐道L80</title>
    <style>
        @font-face {
            font-family: 'ONVOFJH';
            src: url('font/ONVOFJHRegular.otf') format('opentype');
            font-weight: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .map-wrapper {
            width: 100%;
            height: 100vh;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .map-wrapper::-webkit-scrollbar {
            display: none;
        }

        .map-layer {
            height: 100vh;
            width: auto;
            position: relative;
            display: inline-block;
            vertical-align: top;
        }

        .map-layer img {
            height: 100vh;
            width: auto;
            display: block;
        }

        .cars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .car-icon {
            position: absolute;
            width: 60px;
            height: 60px;
            /*border: 1px solid red;*/
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
        }

        .car-icon svg {
            width: 32px;
            height: 32px;
        }

        .car-label {
            font-size: 10px;
            font-weight: 600;
            color: #333;
            margin-top: 2px;
            text-align: center;
        }

        .car-icon[data-type="red"] svg {
            fill: #E63946;
        }

        .car-icon[data-type="red"] .car-label {
            color: #E63946;
        }

        .car-icon[data-type="green"] svg {
            fill: #2D6A4F;
        }

        .car-icon[data-type="green"] .car-label {
            color: #2D6A4F;
        }

        .car-icon[data-type="yellow"] svg {
            fill: #F4A261;
        }

        .car-icon[data-type="yellow"] .car-label {
            color: #F4A261;
        }

        .car-icon .dot {
            position: absolute;
            top: -8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 700;
            color: #fff;
        }

        .car-icon[data-type="red"] .dot {
            background: #FFD166;
            color: #333;
        }

        .car-icon[data-type="green"] .dot {
            background: #6C757D;
        }

        .car-icon[data-type="yellow"] .dot {
            background: #FFD166;
            color: #333;
        }

        .bottom-title {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #FF6B4A;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        @media (max-width: 375px) {
            .car-icon {
                width: 32px;
                height: 32px;
            }

            .car-icon svg {
                width: 26px;
                height: 26px;
            }

            .car-label {
                font-size: 8px;
            }

            .car-icon .dot {
                width: 10px;
                height: 10px;
                font-size: 7px;
            }
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            z-index: 15;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .back-btn svg path {
            stroke: #333;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .map-hint {
            position: fixed;
            right: 20px;
            bottom: 20px;
            font-size: 12px;
            color: #7F7E7E;
            font-family: 'ONVOFJH', sans-serif;
            z-index: 15;
        }
    </style>
</head>
<body>
<div class="map-wrapper" id="mapWrapper">
    <div class="map-layer" id="mapLayer">
        <img src="images/P2-map.jpg" alt="营地地图">
        <div class="cars-layer">
            <div class="car-icon" data-type="yellow" data-id="A" style="left: 23.5%; top: 42%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="1" style="left: 29.5%; top: 51%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="2" style="left: 37.7%; top: 53%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="3" style="left: 58.6%; top: 15.1%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="4" style="left: 66.8%; top: 10%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="5" style="left: 46.4%; top: 10.5%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="6" style="left: 66.8%; top: 52.8%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="6" style="left: 69.3%; top: 52.8%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="7" style="left: 44.4%; top: 32.8%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="8" style="left: 74.2%; top: 21%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="8" style="left: 76.7%; top: 21%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="9" style="left: 57.2%; top: 67.5%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="10" style="left: 29.6%; top: 16%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="11" style="left: 58.2%; top: 42.5%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="13" style="left: 75.5%; top: 43.7%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="13" style="left: 78.1%; top: 43.7%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>
        </div>
        <div class="bottom-title">营地入口</div>
    </div>
</div>

<script>
    const mapWrapper = document.getElementById('mapWrapper');
    //TODO 默认滚动位置
    const INITIAL_SCROLL_PERCENT = 0.76;

    function setInitialScroll() {
        setTimeout(function () {
            const maxScroll = mapWrapper.scrollWidth - mapWrapper.clientWidth;
            mapWrapper.scrollLeft = maxScroll * INITIAL_SCROLL_PERCENT;
        }, 100);
    }

    function onCarClick(element) {
        const carId = element.dataset.id;
        const carType = element.dataset.type;
        console.log('Car clicked:', {id: carId, type: carType});
        //跳转页面3
        location.href = 'page3.html?carId=' + carId;
    }

    let isDragging = false;
    let startX = 0;
    let scrollLeft = 0;

    mapWrapper.addEventListener('mousedown', function (e) {
        isDragging = true;
        startX = e.pageX - mapWrapper.offsetLeft;
        scrollLeft = mapWrapper.scrollLeft;
        mapWrapper.style.cursor = 'grabbing';
    });

    mapWrapper.addEventListener('mouseleave', function () {
        isDragging = false;
        mapWrapper.style.cursor = 'grab';
    });

    mapWrapper.addEventListener('mouseup', function () {
        isDragging = false;
        mapWrapper.style.cursor = 'grab';
    });

    mapWrapper.addEventListener('mousemove', function (e) {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX - mapWrapper.offsetLeft;
        const walk = (x - startX) * 1.5;
        mapWrapper.scrollLeft = scrollLeft - walk;
    });

    mapWrapper.addEventListener('touchstart', function (e) {
        startX = e.touches[0].pageX - mapWrapper.offsetLeft;
        scrollLeft = mapWrapper.scrollLeft;
    }, {passive: true});

    mapWrapper.addEventListener('touchmove', function (e) {
        const x = e.touches[0].pageX - mapWrapper.offsetLeft;
        const walk = (x - startX);
        mapWrapper.scrollLeft = scrollLeft - walk;
    }, {passive: true});

    mapWrapper.style.cursor = 'grab';

    setInitialScroll();
</script>
<div class="map-hint">*左右滑动查看营地地图全景</div>
</body>
</html>
