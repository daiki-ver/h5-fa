<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>营地导览 - 乐道L80</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .map-wrapper {
            width: 100%;
            height: 100vh;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .map-wrapper::-webkit-scrollbar {
            display: none;
        }

        .map-layer {
            height: 100vh;
            width: auto;
            position: relative;
            display: inline-block;
            vertical-align: top;
        }

        .map-layer img {
            height: 100vh;
            width: auto;
            display: block;
        }

        .cars-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .car-icon {
            position: absolute;
            width: 60px;
            height: 60px;
            /*border: 1px solid red;*/
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
        }

        .car-icon svg {
            width: 32px;
            height: 32px;
        }

        .car-label {
            font-size: 10px;
            font-weight: 600;
            color: #333;
            margin-top: 2px;
            text-align: center;
        }

        .car-icon[data-type="red"] svg {
            fill: #E63946;
        }

        .car-icon[data-type="red"] .car-label {
            color: #E63946;
        }

        .car-icon[data-type="green"] svg {
            fill: #2D6A4F;
        }

        .car-icon[data-type="green"] .car-label {
            color: #2D6A4F;
        }

        .car-icon[data-type="yellow"] svg {
            fill: #F4A261;
        }

        .car-icon[data-type="yellow"] .car-label {
            color: #F4A261;
        }

        .car-icon .dot {
            position: absolute;
            top: -8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 700;
            color: #fff;
        }

        .car-icon[data-type="red"] .dot {
            background: #FFD166;
            color: #333;
        }

        .car-icon[data-type="green"] .dot {
            background: #6C757D;
        }

        .car-icon[data-type="yellow"] .dot {
            background: #FFD166;
            color: #333;
        }

        @media (max-width: 375px) {
            .car-icon {
                width: 32px;
                height: 32px;
            }

            .car-icon svg {
                width: 26px;
                height: 26px;
            }

            .car-label {
                font-size: 8px;
            }

            .car-icon .dot {
                width: 10px;
                height: 10px;
                font-size: 7px;
            }
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .back-btn svg path {
            stroke: #333;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .map-hint {
            position: fixed;
            right: 20px;
            bottom: 20px;
            font-size: 12px;
            color: #7F7E7E;
            z-index: 15;
        }
    </style>
</head>
<body>
<div class="map-wrapper" id="mapWrapper">
    <div class="map-layer" id="mapLayer">
        <img src="https://daiki-1304990605.cos.ap-shanghai.myqcloud.com/LD80/images/P2-map.jpg" alt="营地地图">
        <div class="cars-layer">
            <div class="car-icon" data-type="yellow" data-id="P" style="left: 15.7%; top: 42%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="Q" style="left: 22.8%; top: 52%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="R" style="left: 32.8%; top: 54%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="A" style="left: 23.2%; top: 17%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="B" style="left: 41.3%; top: 33.5%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="C" style="left: 43.9%; top: 11.2%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="D" style="left: 58.8%; top: 15.8%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="E" style="left: 58.3%; top: 42.8%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="F" style="left: 57.5%; top: 67.5%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="G" style="left: 68.9%; top: 11%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="H" style="left: 78%; top: 22%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="I" style="left: 81.2%; top: 22%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="J" style="left: 68.8%; top: 52.8%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="K" style="left: 72%; top: 52.8%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="L" style="left: 80%; top: 44.6%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="M" style="left: 83.2%; top: 44.6%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="N" style="left: 90%; top: 15.3%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>

            <div class="car-icon" data-type="green" data-id="O" style="left: 89.5%; top: 60.5%;"
                 onclick="onCarClick(this)">
                <span class="car-label"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const mapWrapper = document.getElementById('mapWrapper');
    //TODO 默认滚动位置
    const INITIAL_SCROLL_PERCENT = 0.22;

    function setInitialScroll() {
        setTimeout(function () {
            const maxScroll = mapWrapper.scrollWidth - mapWrapper.clientWidth;
            mapWrapper.scrollLeft = maxScroll * INITIAL_SCROLL_PERCENT;
        }, 500);
    }

    function onCarClick(element) {
        const carId = element.dataset.id;
        const carType = element.dataset.type;
        console.log('Car clicked:', {id: carId, type: carType});
        //跳转页面3
        location.href = `./point/point-${carId}.html?carId=` + carId;
    }

    let isDragging = false;
    let startX = 0;
    let scrollLeft = 0;

    mapWrapper.addEventListener('mousedown', function (e) {
        isDragging = true;
        startX = e.pageX - mapWrapper.offsetLeft;
        scrollLeft = mapWrapper.scrollLeft;
        mapWrapper.style.cursor = 'grabbing';
    });

    mapWrapper.addEventListener('mouseleave', function () {
        isDragging = false;
        mapWrapper.style.cursor = 'grab';
    });

    mapWrapper.addEventListener('mouseup', function () {
        isDragging = false;
        mapWrapper.style.cursor = 'grab';
    });

    mapWrapper.addEventListener('mousemove', function (e) {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX - mapWrapper.offsetLeft;
        const walk = (x - startX) * 1.5;
        mapWrapper.scrollLeft = scrollLeft - walk;
    });

    mapWrapper.addEventListener('touchstart', function (e) {
        startX = e.touches[0].pageX - mapWrapper.offsetLeft;
        scrollLeft = mapWrapper.scrollLeft;
    }, {passive: true});

    mapWrapper.addEventListener('touchmove', function (e) {
        const x = e.touches[0].pageX - mapWrapper.offsetLeft;
        const walk = (x - startX);
        mapWrapper.scrollLeft = scrollLeft - walk;
    }, {passive: true});

    mapWrapper.style.cursor = 'grab';

    setInitialScroll();
</script>
<div class="map-hint">*左右滑动查看营地地图全景</div>
</body>
</html>
